spring:
  application:
    name: atlas

  datasource:
    url: jdbc:postgresql://localhost:5433/atlas
    username: atlas
    password: atlas
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    open-in-view: false

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080